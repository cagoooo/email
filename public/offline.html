<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>離線模式 - 石門國小 Email 學習</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .retry-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .features {
            margin-top: 2rem;
            text-align: left;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .feature-icon {
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }
        
        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            backdrop-filter: blur(10px);
        }
        
        .offline {
            color: #ff6b6b;
        }
        
        .online {
            color: #51cf66;
        }
    </style>
</head>
<body>
    <div class="status-indicator">
        <span id="status" class="offline">🔴 離線模式</span>
    </div>
    
    <div class="offline-container">
        <div class="offline-icon">📚</div>
        <h1>石門國小 Email 學習</h1>
        <p>
            目前無法連接到網路，但您仍然可以使用部分功能。
            <br>
            您的學習進度會在重新連線時自動同步。
        </p>
        
        <a href="/" class="retry-btn" onclick="window.location.reload()">
            🔄 重新連線
        </a>
        
        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">✅</span>
                <span>可以繼續進行已下載的學習內容</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">💾</span>
                <span>學習進度會自動保存到本地</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🔄</span>
                <span>重新連線時會自動同步數據</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🎮</span>
                <span>離線遊戲模式可正常使用</span>
            </div>
        </div>
    </div>

    <script>
        // 監聽網路狀態變化
        function updateOnlineStatus() {
            const status = document.getElementById('status');
            if (navigator.onLine) {
                status.textContent = '🟢 已連線';
                status.className = 'online';
                // 自動重新載入頁面
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } else {
                status.textContent = '🔴 離線模式';
                status.className = 'offline';
            }
        }

        // 初始化狀態
        updateOnlineStatus();

        // 監聽網路狀態變化事件
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // 定期檢查網路連接
        setInterval(() => {
            fetch('/', { method: 'HEAD', cache: 'no-cache' })
                .then(() => {
                    if (!navigator.onLine) {
                        // 手動觸發 online 事件
                        window.dispatchEvent(new Event('online'));
                    }
                })
                .catch(() => {
                    // 網路仍然不可用
                });
        }, 5000);
    </script>
</body>
</html>
